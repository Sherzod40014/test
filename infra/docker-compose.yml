# Local development infrastructure -- see ../.env.example for the matching connection strings.
# Run: pnpm docker:up

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_dev_password
      POSTGRES_DB: erp_wms
    ports:
      - '5432:5432'
    volumes:
      - erp-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp -d erp_wms']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: erp
      RABBITMQ_DEFAULT_PASS: erp_dev_password
    ports:
      - '5672:5672'
      - '15672:15672' # management UI
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: erp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: erp_minio_admin
      MINIO_ROOT_PASSWORD: erp_minio_dev_password
    command: 'server /data --console-address :9001'
    ports:
      - '9000:9000'
      - '9001:9001' # console
    volumes:
      - erp-minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: erp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 erp_minio_admin erp_minio_dev_password
        mc mb -p local/cargo-media
        mc mb -p local/documents
        mc mb -p local/labels
        exit 0

volumes:
  erp-postgres-data:
  erp-minio-data:
